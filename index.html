<!DOCTYPE html>
  <head>
    <title>Todo App</title>
    <link href="https://fonts.googleapis.com/css?family=Lato:300,400,700"
          rel="stylesheet">
    <link rel="stylesheet"
          href="style.css"
          media="screen"
          charset="utf-8">
  </head>
  <body class="page">
    <header class="header">
      <img alt="eisenhower matrix" src="./eisenhower-matrix.jpg">
      <a class="more-inf"
           href="https://goal-life.com/page/method/matrix-eisenhower">Want more details?
      </a>
    </header>
    <section class="centered-main-page-element">
      <p id="top-section-for-adding-element">
        <label class="new-task-label" for="new-task">Add Item</label>
        <div class="task-row-wrapper">
          <input id="new-task" class="task task-text" type="text">
          <button class="button">Add</button>
        </div>
      </p>
      <h3 class="heading">Todo</h3>
      <ul class="list" id="incomplete-tasks">
        <li class="list-item">
          <input type="checkbox" class="checkbox-input">
          <label class="task">Pay Bills</label>
          <input type="text" class="task task-text">
          <button class="edit button">Edit</button>
          <button class="delete button">
            <img alt="delete icon" class="delete-img" src="./remove.svg">
          </button>
        </li>
        <li class="list-item edit-mode">
          <input type="checkbox" class="checkbox-input">
          <label class="task">Go Shopping</label>
          <input type="text" value="Go Shopping" class="task task-text">
          <button class="edit button">Save</button>
          <button class="delete button">
            <img alt="delete-icon" class="delete-img" src="./remove.svg">
          </button>
        </li>
      </ul>
      <h3>Completed</h3>
      <ul class="list" id="completed-tasks">
        <li class="list-item">
          <input type="checkbox" class="checkbox-input" checked>
          <label class="task">See the Doctor</label>
          <input type="text" class="task task-text">
          <button class="edit button">Edit</button>
          <button class="delete button">
            <img alt="delete-icon" class="delete-img" src="./remove.svg">
          </button>
        </li>
      </ul>
    </section>
    <script src="app.js"></script>
</body>
</html>
